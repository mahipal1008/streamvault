services:
  - type: web
    name: streamvault-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /livez
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # MUST be set to the exact web origin in the Render dashboard, e.g.
      # https://streamvault-web.onrender.com. The API refuses to start if this
      # is "*" while NODE_ENV=production.
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PROXY_URL
        sync: false
      - key: API_KEY
        sync: false

  - type: web
    name: streamvault-web
    runtime: node
    buildCommand: npm install --include=dev && npm run build --workspace=packages/shared && npm run build --workspace=apps/web
    startCommand: npm run start --workspace=apps/web
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: streamvault-api
          type: web
          property: serviceUrl
